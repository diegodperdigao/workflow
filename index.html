<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3C - Sistema de Tarefas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .hidden { display: none; }
        body { background-color: #0f172a; color: white; min-height: 100vh; }
    </style>
</head>
<body>

    <div id="lock-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900">
        <div class="text-center p-8 glass-card rounded-3xl">
            <h1 class="text-2xl font-bold mb-6">🔒 Acesso Restrito 3C</h1>
            <input type="password" id="password-input" placeholder="Digite a senha" 
                   class="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 mb-4 block w-full text-center">
            <button onclick="checkPassword()" class="bg-cyan-600 hover:bg-cyan-500 px-6 py-2 rounded-lg font-bold w-full transition">
                Entrar
            </button>
        </div>
    </div>

    <main id="main-content" class="hidden p-4 max-w-2xl mx-auto">
        <header class="flex justify-between items-center mb-8 pt-4">
            <h1 class="text-3xl font-black tracking-tiled text-cyan-400">3C <span class="text-white text-sm font-normal">v2026</span></h1>
            <div class="text-right">
                <p class="text-xs text-gray-400">Progresso Geral</p>
                <div class="w-32 h-2 bg-gray-800 rounded-full mt-1">
                    <div id="overall-progress" class="h-full bg-cyan-500 rounded-full transition-all" style="width: 0%"></div>
                </div>
            </div>
        </header>

        <div class="glass-card p-4 rounded-2xl mb-6">
            <input type="text" id="main-task-input" placeholder="O que você precisa fazer?" class="w-full bg-transparent border-b border-gray-700 py-2 mb-3 outline-none focus:border-cyan-500 transition">
            <textarea id="main-desc-input" placeholder="Detalhes (opcional)" class="w-full bg-transparent text-sm text-gray-400 mb-3 outline-none"></textarea>
            <div class="flex justify-between items-center">
                <select id="priority-select" class="bg-slate-800 text-xs rounded p-1">
                    <option value="low">Baixa</option>
                    <option value="medium">Média</option>
                    <option value="high">ALTA 🔥</option>
                </select>
                <input type="datetime-local" id="reminder-input" class="bg-slate-800 text-xs rounded p-1">
                <button onclick="addMainTask()" class="bg-cyan-600 p-2 rounded-full hover:scale-110 transition">
                    <i data-lucide="plus"></i>
                </button>
            </div>
        </div>

        <div id="task-list"></div>
    </main>

    <script>
        // CONFIGURAÇÕES
        let tasks = JSON.parse(localStorage.getItem('3c_tasks_v26')) || [];
        const ACCESS_PASSWORD = "3c2026";

        // Inicializar ícones
        function refreshIcons() {
            if (window.lucide) lucide.createIcons();
        }

        // SENHA
        window.checkPassword = function() {
            const val = document.getElementById('password-input').value;
            if(val === ACCESS_PASSWORD) {
                document.getElementById('lock-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                renderTasks();
            } else {
                alert("Senha incorreta!");
            }
        };

        // VOZ
        window.playMemeSound = function(txt) {
            const msg = new SpeechSynthesisUtterance("Vai trabalhar! Você tem que " + txt);
            msg.lang = "pt-BR";
            window.speechSynthesis.speak(msg);
        };

        // ADICIONAR
        window.addMainTask = function() {
            const title = document.getElementById('main-task-input');
            if(!title.value) return;

            const newTask = {
                id: Date.now().toString(),
                text: title.value,
                description: document.getElementById('main-desc-input').value,
                priority: document.getElementById('priority-select').value,
                completed: false,
                reminderAt: document.getElementById('reminder-input').value ? new Date(document.getElementById('reminder-input').value).getTime() : null
            };

            tasks.unshift(newTask);
            save();
            title.value = '';
            playMemeSound(newTask.text);
        };

        window.toggleTask = function(id) {
            const t = tasks.find(x => x.id === id);
            if(t) t.completed = !t.completed;
            save();
        };

        window.deleteTask = function(id) {
            tasks = tasks.filter(x => x.id !== id);
            save();
        };

        function save() {
            localStorage.setItem('3c_tasks_v26', JSON.stringify(tasks));
            renderTasks();
        }

        function renderTasks() {
            const list = document.getElementById('task-list');
            list.innerHTML = tasks.map(t => `
                <div class="glass-card p-4 rounded-xl mb-3 flex justify-between items-center ${t.completed ? 'opacity-50' : ''}">
                    <div>
                        <h3 class="font-bold ${t.completed ? 'line-through' : ''}">${t.text}</h3>
                        <p class="text-xs text-gray-500">${t.description || ''}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="toggleTask('${t.id}')" class="text-green-500"><i data-lucide="check"></i></button>
                        <button onclick="deleteTask('${t.id}')" class="text-red-500"><i data-lucide="trash"></i></button>
                    </div>
                </div>
            `).join('');
            
            // Atualiza barra de progresso
            const done = tasks.filter(x => x.completed).length;
            const percent = tasks.length ? (done / tasks.length) * 100 : 0;
            document.getElementById('overall-progress').style.width = percent + '%';
            
            refreshIcons();
        }

        // Executa ao carregar
        window.onload = refreshIcons;
    </script>
</body>
</html>
