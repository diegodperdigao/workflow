<script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js'
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js'
        import { getFirestore, collection, doc, onSnapshot, setDoc, deleteDoc, updateDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js'

        let db, auth, currentUser;
        let tasks = [];
        let editingId = null;
        let currentFilter = 'all';
        let isCloudMode = false;
        const ACCESS_PASSWORD = "3c2026"; 

        // --- SISTEMA DE ÁUDIO DINÂMICO SARCÁSTICO ---
        function playMemeSound(tituloTarefa = "") {
            try {
                window.speechSynthesis.cancel();

                // Lista de esporros engraçados
                const prefixos = [
                    "Vai trabalhar vagabundo! Você tem que ",
                    "Para de ser herdeiro e vai logo ",
                    "O boleto não se paga sozinho! Vai agora ",
                    "Larga esse celular e foca em ",
                    "Status de hoje: pobre! Anda logo e vai ",
                    "A herança não veio, então mexe esse corpo para "
                ];

                const prefixoAleatorio = prefixos[Math.floor(Math.random() * prefixos.length)];
                const mensagemCompleta = prefixoAleatorio + (tituloTarefa || "fazer suas obrigações");

                const utterance = new SpeechSynthesisUtterance(mensagemCompleta);
                utterance.lang = "pt-BR";
                
                // Configuração da Voz (Busca feminina ou ajusta tom)
                const voices = window.speechSynthesis.getVoices();
                const femaleVoice = voices.find(v => v.lang.includes('pt') && 
                    (v.name.toLowerCase().includes('female') || v.name.toLowerCase().includes('maria') || 
                     v.name.toLowerCase().includes('luciana') || v.name.toLowerCase().includes('victoria') || 
                     v.name.toLowerCase().includes('francisca')));
                
                if (femaleVoice) {
                    utterance.voice = femaleVoice;
                } else {
                    utterance.pitch = 1.3; // Simula voz feminina se não houver nativa
                }
                
                utterance.rate = 1.1; // Levemente apressada
                window.speechSynthesis.speak(utterance);
            } catch(e) {
                console.error("Erro na síntese de voz:", e);
            }
        }

        // --- SISTEMA DE FAVICON PREMIUM ---
        function updateFavicon(hasPending) {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            
            const logoImg = new Image();
            logoImg.crossOrigin = "anonymous";
            logoImg.src = "https://i.ibb.co/TDvNpKbv/285535120-111261434935979-5560566145880188190-n.jpg";
            
            logoImg.onload = () => {
                ctx.save();
                ctx.beginPath();
                ctx.arc(32, 32, 30, 0, Math.PI * 2);
                ctx.clip();
                ctx.drawImage(logoImg, 0, 0, 64, 64);
                ctx.restore();

                if (hasPending) {
                    ctx.fillStyle = '#ff0000';
                    ctx.shadowBlur = 4;
                    ctx.shadowColor = "rgba(0,0,0,0.5)";
                    ctx.beginPath(); ctx.arc(52, 12, 10, 0, Math.PI * 2); ctx.fill();
                    ctx.strokeStyle = '#030008'; ctx.lineWidth = 3; ctx.stroke();
                }
                
                const link = document.querySelector("link[rel*='icon']") || document.createElement('link');
                link.type = 'image/x-icon'; link.rel = 'shortcut icon';
                link.href = canvas.toDataURL("image/x-icon");
                document.getElementsByTagName('head')[0].appendChild(link);
            };
        }

        // --- INICIALIZAÇÃO E FIREBASE ---
        const init = async () => {
            window.speechSynthesis.onvoiceschanged = () => {};
            
            try {
                if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                    const firebaseConfig = JSON.parse(__firebase_config);
                    const app = initializeApp(firebaseConfig);
                    auth = getAuth(app);
                    db = getFirestore(app);
                    isCloudMode = true;
                    onAuthStateChanged(auth, (user) => {
                        currentUser = user;
                        if (user) {
                            document.getElementById('user-id-text').innerText = `ID: ${user.uid.substring(0, 12)}`;
                            document.getElementById('status-dot').className = "w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse";
                            setupSync();
                        }
                    });
                } else { useLocalMode(); }
            } catch (err) { useLocalMode(); }
        };

        function useLocalMode() {
            isCloudMode = false;
            const saved = localStorage.getItem('3c_tasks_v26_premium');
            if (saved) tasks = JSON.parse(saved);
            renderTasks();
        }

        function setupSync() {
            const appId = 'workflow-md-master-v2';
            const tasksCol = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'tasks');
            onSnapshot(tasksCol, (snap) => {
                tasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                tasks.sort((a, b) => b.createdAt - a.createdAt);
                renderTasks();
                document.getElementById('sync-time').innerText = new Date().toLocaleTimeString('pt-BR');
            });
        }

        // --- INTERFACE E LOGICA DE TAREFAS ---
        window.checkPassword = () => {
            if(document.getElementById('password-input').value === ACCESS_PASSWORD) {
                const lock = document.getElementById('lock-screen'), main = document.getElementById('main-content');
                lock.style.opacity = '0';
                setTimeout(() => { lock.style.display = 'none'; main.classList.remove('hidden'); setTimeout(() => main.style.opacity = '1', 50); }, 700);
            } else {
                const input = document.getElementById('password-input');
                input.classList.add('shake'); input.value = ''; setTimeout(() => input.classList.remove('shake'), 400);
            }
        };

        window.addMainTask = async () => {
            const titleInput = document.getElementById('main-task-input'), descInput = document.getElementById('main-desc-input'), reminderInput = document.getElementById('reminder-input');
            const title = titleInput.value.trim();
            if (!title) return;
            const newTask = {
                text: title, description: descInput.value, priority: document.getElementById('priority-select').value,
                completed: false, expanded: false, createdAt: Date.now(),
                reminderAt: reminderInput.value ? new Date(reminderInput.value).getTime() : null,
                reminderSent: false, subtasks: []
            };
            if (isCloudMode && currentUser) {
                const appId = 'workflow-md-master-v2';
                await setDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'tasks', Date.now().toString()), newTask);
            } else {
                newTask.id = Date.now().toString(); tasks.unshift(newTask); saveLocal();
            }
            titleInput.value = ''; descInput.value = ''; reminderInput.value = '';
            playMemeSound(title); // Fala ao criar
        };

        window.toggleTask = async (id) => {
            const tId = id.toString();
            const t = tasks.find(x => x.id === tId);
            const newState = !t.completed;
            if (isCloudMode && currentUser) {
                const appId = 'workflow-md-master-v2';
                await updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'tasks', tId), { completed: newState });
            } else {
                t.completed = newState;
                saveLocal();
            }
        };

        window.deleteTask = async (id) => {
            if (isCloudMode && currentUser) {
                const appId = 'workflow-md-master-v2';
                await deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'tasks', id.toString()));
            } else {
                tasks = tasks.filter(x => x.id !== id.toString());
                saveLocal();
            }
        };

        window.startEdit = (id) => { editingId = id.toString(); renderTasks(); };
        
        window.saveEdit = async (id) => {
            const title = document.getElementById(`edit-title-${id}`).value;
            const desc = document.getElementById(`edit-desc-${id}`).value;
            if (isCloudMode && currentUser) {
                const appId = 'workflow-md-master-v2';
                await updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'tasks', id.toString()), { text: title, description: desc });
            } else {
                const t = tasks.find(x => x.id === id.toString());
                t.text = title; t.description = desc;
                saveLocal();
            }
            editingId = null;
            renderTasks();
        };

        window.toggleExpand = (id) => {
            const t = tasks.find(x => x.id === id.toString());
            t.expanded = !t.expanded;
            renderTasks();
        };

        window.setFilter = (f) => {
            currentFilter = f;
            renderTasks();
        };

        window.testAlert = () => {
            playMemeSound("o teste de sistema");
        };

        function saveLocal() { localStorage.setItem('3c_tasks_v26_premium', JSON.stringify(tasks)); renderTasks(); }

        function renderTasks() {
            const container = document.getElementById('task-list'), empty = document.getElementById('empty-state');
            const filtered = tasks.filter(t => currentFilter === 'pending' ? !t.completed : currentFilter === 'completed' ? t.completed : true);
            
            if (!filtered.length) { container.innerHTML = ''; empty.classList.remove('hidden'); }
            else { empty.classList.add('hidden'); container.innerHTML = filtered.map(t => generateHTML(t)).join(''); }
            
            const total = tasks.length, concl = tasks.filter(x => x.completed).length;
            const p = total ? Math.round((concl / total) * 100) : 0;
            document.getElementById('overall-progress').style.width = `${p}%`;
            document.getElementById('percent-display').innerText = `${p}%`;
            
            updateFavicon(tasks.some(t => !t.completed));
            lucide.createIcons();
        }

        function generateHTML(t) {
            const isEditing = editingId === t.id.toString();
            const reminderDate = t.reminderAt ? new Date(t.reminderAt).toLocaleString('pt-BR') : null;

            return `
                <div class="glass-card rounded-2xl overflow-hidden mb-4 ${t.completed ? 'completed-task' : `priority-${t.priority}-border`}">
                    <div class="p-4">
                        <div class="flex items-start gap-4">
                            <button onclick="toggleTask('${t.id}')"><i data-lucide="${t.completed ? 'check-circle-2' : 'circle'}" class="w-6 h-6 ${t.completed ? 'text-emerald-500' : 'text-white/10'}"></i></button>
                            <div class="flex-grow">
                                ${isEditing ? `<input type="text" id="edit-title-${t.id}" value="${t.text}" class="edit-mode-input mb-2">` : `<h3 class="font-black uppercase ${t.completed ? 'completed-text' : ''}">${t.text}</h3>`}
                                ${isEditing ? `<textarea id="edit-desc-${t.id}" class="edit-mode-input text-xs">${t.description || ''}</textarea>` : `<p class="text-[11px] text-gray-400">${t.description || ''}</p>`}
                                ${reminderDate ? `<span class="text-[8px] text-pink-500 font-bold uppercase mt-2 block">🔔 ${reminderDate}</span>` : ''}
                            </div>
                            <div class="flex gap-2">
                                <button onclick="playMemeSound('${t.text}')" class="p-2 hover:bg-white/5 rounded-lg"><i data-lucide="volume-2" class="w-4 h-4 text-pink-500"></i></button>
                                ${isEditing ? `<button onclick="saveEdit('${t.id}')"><i data-lucide="check" class="w-4 h-4 text-emerald-500"></i></button>` : `<button onclick="startEdit('${t.id}')"><i data-lucide="pencil" class="w-4 h-4 text-gray-500"></i></button>`}
                                <button onclick="deleteTask('${t.id}')"><i data-lucide="trash-2" class="w-4 h-4 text-gray-500"></i></button>
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        // --- MONITOR DE REMINDERS (CHECA A CADA 5 SEG) ---
        setInterval(() => {
            const now = Date.now();
            tasks.forEach(task => {
                if (!task.completed && task.reminderAt && !task.reminderSent && now >= task.reminderAt) {
                    document.getElementById('alert-title').innerText = task.text;
                    document.getElementById('browser-alert').style.display = 'block';
                    playMemeSound(task.text);
                    task.reminderSent = true;
                    if (!isCloudMode) saveLocal();
                }
            });
        }, 5000);

        init();
    </script>
