<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3C - Gestão de Tarefas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hidden { display: none; }
        body { background: radial-gradient(circle at top right, #1e1b4b, #0f172a); color: white; min-height: 100vh; overflow-x: hidden; }
        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body>

    <div id="lock-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950">
        <div class="text-center p-10 glass-card rounded-[2rem] shadow-2xl max-w-sm w-full mx-4">
            <div class="mb-6 flex justify-center"><i data-lucide="shield-check" class="w-12 h-12 text-cyan-500"></i></div>
            <h1 class="text-2xl font-black mb-2 tracking-widest">SISTEMA 3C</h1>
            <p class="text-gray-400 text-sm mb-8 font-mono">AUTHENTICATION REQUIRED</p>
            
            <input type="password" id="password-input" placeholder="••••••" 
                   class="bg-black/40 border border-white/10 rounded-xl px-4 py-4 mb-4 block w-full text-center tracking-[1em] focus:border-cyan-500 transition-all outline-none">
            
            <button onclick="checkPassword()" class="bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-4 rounded-xl w-full transition-all active:scale-95 shadow-lg shadow-cyan-900/20">
                ACESSAR SISTEMA
            </button>
        </div>
    </div>

    <main id="main-content" class="hidden p-6 max-w-2xl mx-auto opacity-0 transition-opacity duration-1000">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-4xl font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-pink-500">3C</h1>
                <p class="text-[10px] text-gray-500 font-mono">STATUS: OPERATIONAL</p>
            </div>
            <div class="text-right">
                <p class="text-xs font-bold text-gray-400 mb-1">COMPLETION <span id="percent-display">0%</span></p>
                <div class="w-32 h-1.5 bg-white/5 rounded-full overflow-hidden">
                    <div id="overall-progress" class="h-full bg-gradient-to-r from-cyan-500 to-blue-500 transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
        </header>

        <div class="glass-card p-6 rounded-[2rem] mb-8 border-t border-white/20">
            <input type="text" id="main-task-input" placeholder="QUAL A MISSÃO DE HOJE?" class="w-full bg-transparent text-xl font-bold border-none outline-none mb-2 placeholder:text-white/20">
            <textarea id="main-desc-input" placeholder="Adicionar detalhes estratégicos..." class="w-full bg-transparent text-sm text-gray-400 outline-none mb-4 h-8 resize-none"></textarea>
            
            <div class="flex flex-wrap gap-4 items-center justify-between border-t border-white/5 pt-4">
                <div class="flex gap-2">
                    <select id="priority-select" class="bg-white/5 text-[10px] uppercase font-bold rounded-lg px-3 py-2 border border-white/10 outline-none">
                        <option value="low">Prioridade Baixa</option>
                        <option value="medium">Prioridade Média</option>
                        <option value="high">Prioridade Máxima 🔥</option>
                    </select>
                    <input type="datetime-local" id="reminder-input" class="bg-white/5 text-[10px] rounded-lg px-3 py-2 border border-white/10 outline-none">
                </div>
                <button onclick="addMainTask()" class="bg-white text-black h-12 w-12 rounded-2xl flex items-center justify-center hover:bg-cyan-400 transition-colors shadow-xl">
                    <i data-lucide="plus" class="w-6 h-6"></i>
                </button>
            </div>
        </div>

        <div id="task-list" class="space-y-4"></div>
    </main>

    <script>
        // 1. DADOS E ESTADO
        let tasks = JSON.parse(localStorage.getItem('3c_tasks_v26')) || [];
        const ACCESS_PASSWORD = "3c2026";

        // 2. FUNÇÃO DE SENHA (COM ENTER)
        window.checkPassword = function() {
            const input = document.getElementById('password-input');
            if (input.value === ACCESS_PASSWORD) {
                document.getElementById('lock-screen').style.display = 'none';
                const main = document.getElementById('main-content');
                main.classList.remove('hidden');
                setTimeout(() => main.classList.add('opacity-100'), 50);
                renderTasks();
            } else {
                input.parentElement.classList.add('shake');
                setTimeout(() => input.parentElement.classList.remove('shake'), 400);
                input.value = '';
            }
        };

        // Escutar a tecla Enter no campo de senha
        document.getElementById('password-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPassword();
        });

        // 3. SISTEMA DE VOZ
        window.playMemeSound = function(titulo = "") {
            const frases = ["Vai trabalhar vagabundo! ", "Larga o celular e foca em ", "Boleto não espera! Vai logo "];
            const rand = frases[Math.floor(Math.random() * frases.length)];
            const msg = new SpeechSynthesisUtterance(rand + titulo);
            msg.lang = "pt-BR";
            msg.rate = 1.1;
            window.speechSynthesis.speak(msg);
        };

        // 4. LÓGICA DE TAREFAS
        window.addMainTask = function() {
            const input = document.getElementById('main-task-input');
            if (!input.value.trim()) return;

            const newTask = {
                id: Date.now().toString(),
                text: input.value,
                description: document.getElementById('main-desc-input').value,
                priority: document.getElementById('priority-select').value,
                completed: false,
                reminderAt: document.getElementById('reminder-input').value ? new Date(document.getElementById('reminder-input').value).getTime() : null
            };

            tasks.unshift(newTask);
            save();
            input.value = '';
            document.getElementById('main-desc-input').value = '';
            playMemeSound(newTask.text);
        };

        window.toggleTask = function(id) {
            const t = tasks.find(x => x.id === id);
            if (t) t.completed = !t.completed;
            save();
        };

        window.deleteTask = function(id) {
            tasks = tasks.filter(x => x.id !== id);
            save();
        };

        function save() {
            localStorage.setItem('3c_tasks_v26', JSON.stringify(tasks));
            renderTasks();
        }

        function renderTasks() {
            const list = document.getElementById('task-list');
            list.innerHTML = tasks.map(t => `
                <div class="glass-card p-5 rounded-3xl flex justify-between items-center transition-all ${t.completed ? 'opacity-30 scale-95' : 'hover:border-white/20'}">
                    <div class="flex gap-4 items-center">
                        <button onclick="toggleTask('${t.id}')" class="w-6 h-6 rounded-full border-2 border-cyan-500 flex items-center justify-center">
                            ${t.completed ? '<div class="w-3 h-3 bg-cyan-500 rounded-full"></div>' : ''}
                        </button>
                        <div>
                            <h3 class="font-bold uppercase tracking-tight ${t.completed ? 'line-through' : ''}">${t.text}</h3>
                            <p class="text-[10px] text-gray-500 uppercase">${t.description || ''}</p>
                        </div>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="playMemeSound('${t.text}')" class="text-cyan-500 opacity-50 hover:opacity-100"><i data-lucide="volume-2" class="w-4 h-4"></i></button>
                        <button onclick="deleteTask('${t.id}')" class="text-red-900 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                </div>
            `).join('');
            
            // Progresso
            const done = tasks.filter(x => x.completed).length;
            const p = tasks.length ? Math.round((done / tasks.length) * 100) : 0;
            document.getElementById('overall-progress').style.width = p + '%';
            document.getElementById('percent-display').innerText = p + '%';
            
            lucide.createIcons();
        }

        window.onload = () => lucide.createIcons();
    </script>
</body>
</html>
