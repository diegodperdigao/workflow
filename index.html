<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workflow 3C | Projeto MD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;300;400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #030008;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* FUNDO E EFEITOS */
        .bg-fluid {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
            background: radial-gradient(circle at 80% 20%, rgba(255, 0, 127, 0.06) 0%, transparent 50%),
                        radial-gradient(circle at 20% 80%, rgba(106, 13, 173, 0.08) 0%, transparent 50%);
        }

        .bg-noise {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.04; 
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* MOSAICO INFINITO REAL */
        .mosaic-wrapper {
            position: absolute; inset: 0; overflow: hidden; z-index: 0; pointer-events: none; 
            -webkit-mask-image: linear-gradient(to bottom, transparent 0px, black 15%, black 85%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0px, black 15%, black 85%, transparent 100%);
            opacity: 0.22;
        }
        .mosaic-container {
            position: absolute; inset: 0; width: 110%; height: 110%;
            transform: perspective(1000px) rotateX(15deg) rotateY(-5deg) rotateZ(2deg);
        }
        .mosaic-pattern {
            width: 100%; height: 100%;
            background-image: url('https://i.ibb.co/TDvNpKbv/285535120-111261434935979-5560566145880188190-n.jpg');
            background-size: 100px; background-repeat: repeat;
            animation: panMosaic 60s linear infinite;
        }
        @keyframes panMosaic { from { background-position: 0px 0px; } to { background-position: -200px -200px; } }

        .glass-header { background: rgba(5, 5, 10, 0.95); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-card { background: rgba(15, 15, 20, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .command-input:focus { border-color: rgba(236, 72, 153, 0.4); background: rgba(0, 0, 0, 0.85); color: #fff; }
        .command-input::placeholder { color: #a1a1aa !important; opacity: 1; }

        .priority-high-border { border-left: 3px solid #f43f5e; }
        .priority-medium-border { border-left: 3px solid #a855f7; }
        .priority-low-border { border-left: 3px solid #06b6d4; }
        .tag-high { background: rgba(244, 63, 94, 0.1); color: #f43f5e; border: 1px solid rgba(244, 63, 94, 0.2); }
        .tag-medium { background: rgba(168, 85, 247, 0.1); color: #a855f7; border: 1px solid rgba(168, 85, 247, 0.2); }
        .tag-low { background: rgba(6, 182, 212, 0.1); color: #06b6d4; border: 1px solid rgba(6, 182, 212, 0.2); }

        .completed-task { opacity: 0.25; filter: grayscale(1); }
        .completed-text { text-decoration: line-through; color: #71717a; }

        .animate-task { animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .reminder-wrapper { position: relative; display: flex; align-items: center; }
        input[type="datetime-local"] { padding-right: 45px !important; width: 100%; }
        input[type="datetime-local"]::-webkit-calendar-picker-indicator {
            background: transparent; bottom: 0; color: transparent; cursor: pointer;
            height: auto; left: 0; position: absolute; right: 0; top: 0; width: auto; z-index: 10;
        }
        .reminder-wrapper::after {
            content: '📅'; position: absolute; right: 15px; top: 50%;
            transform: translateY(-50%); pointer-events: none; opacity: 0.4; font-size: 14px;
        }

        #browser-alert {
            display: none;
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; width: 90%; max-width: 550px;
            background: rgba(20, 20, 25, 0.9); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #ec4899;
            padding: 24px; border-radius: 24px; 
            box-shadow: 0 40px 80px rgba(0,0,0,0.9);
            animation: meetPop 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }
        @keyframes meetPop { from { opacity: 0; transform: translate(-50%, -40px); } to { opacity: 1; transform: translate(-50%, 0); } }

        .edit-mode-input { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); padding: 8px 12px; border-radius: 8px; width: 100%; outline: none; color: #fff; }
        .form-label { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.15em; color: #6b7280; font-style: italic; margin-left: 0.5rem; }
        
        button svg { pointer-events: none; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .shake { animation: shake 0.2s ease-in-out 0s 2; border-color: #ef4444 !important; }
    </style>
</head>
<body class="antialiased selection:bg-pink-500 selection:text-white">

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js'
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js'
        import { getFirestore, collection, doc, onSnapshot, addDoc, deleteDoc, updateDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js'

        let db, auth, currentUser;
        let tasks = [];
        let editingId = null;
        let currentFilter = 'all';
        let isCloudMode = false;
        const ACCESS_PASSWORD = "3c2026"; 

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'workflow-3c-app-default';

        // --- SISTEMA DE ÁUDIO MEME FEMININO ---
        const alertPrefixes = [
            "Vai trabalhar vagabundo! Você tem que ",
            "Para de ser herdeiro e vai logo ",
            "O boleto não se paga sozinho! Vai agora ",
            "Larga esse celular e foca em ",
            "Status de hoje: pobre! Anda logo e vai ",
            "Seu futuro self está passando fome porque você não quer "
        ];

        window.triggerTaskAlert = (taskTitle) => {
            const randomPrefix = alertPrefixes[Math.floor(Math.random() * alertPrefixes.length)];
            const fullMessage = randomPrefix + taskTitle;

            // Atualiza a interface da notificação
            const prefixEl = document.getElementById('alert-prefix');
            if (prefixEl) prefixEl.innerText = randomPrefix.trim();
            document.getElementById('alert-title').innerText = taskTitle;
            document.getElementById('browser-alert').style.display = 'block';

            // Toca o áudio
            try {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(fullMessage);
                utterance.lang = "pt-BR";
                
                // Tenta encontrar uma voz feminina
                const voices = window.speechSynthesis.getVoices();
                const femaleVoice = voices.find(v => v.lang.includes('pt') && (v.name.toLowerCase().includes('female') || v.name.toLowerCase().includes('maria') || v.name.toLowerCase().includes('luciana') || v.name.toLowerCase().includes('victoria')));
                
                if (femaleVoice) {
                    utterance.voice = femaleVoice;
                } else {
                    // Se não encontrar voz feminina explícita, aumenta o pitch para simular
                    utterance.pitch = 1.3; 
                }
                
                utterance.rate = 1.0;
                window.speechSynthesis.speak(utterance);
            } catch(e) {}
        };

        // Loop que monitora os lembretes automaticamente em background
        const notifiedTasks = new Set();
        setInterval(() => {
            const now = new Date();
            tasks.forEach(task => {
                if (!task.completed && task.reminder) {
                    const reminderTime = new Date(task.reminder);
                    // Se chegou a hora do lembrete (com margem de 1 minuto) e não foi notificado ainda
                    if (now >= reminderTime && (now - reminderTime) < 60000 && !notifiedTasks.has(task.id)) {
                        window.triggerTaskAlert(task.title);
                        notifiedTasks.add(task.id);
                    }
                }
            });
        }, 15000); // Checa os lembretes a cada 15 segundos

        // --- SISTEMA DE FAVICON PREMIUM ---
        function updateFavicon(hasPending) {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            
            const logoImg = new Image();
            logoImg.crossOrigin = "anonymous";
            logoImg.src = "https://i.ibb.co/TDvNpKbv/285535120-111261434935979-5560566145880188190-n.jpg";
            
            logoImg.onload = () => {
                // Desenha a logo circular
                ctx.save();
                ctx.beginPath();
                ctx.arc(32, 32, 30, 0, Math.PI * 2);
                ctx.clip();
                ctx.drawImage(logoImg, 0, 0, 64, 64);
                ctx.restore();

                if (hasPending) {
                    // Ponto Vermelho (Alert)
                    ctx.fillStyle = '#ff0000';
                    ctx.shadowBlur = 4;
                    ctx.shadowColor = "rgba(0,0,0,0.5)";
                    ctx.beginPath(); ctx.arc(52, 12, 10, 0, Math.PI * 2); ctx.fill();
                    ctx.strokeStyle = '#030008'; ctx.lineWidth = 3; ctx.stroke();
                }
                
                const link = document.querySelector("link[rel*='icon']") || document.createElement('link');
                link.type = 'image/x-icon'; link.rel = 'shortcut icon';
                link.href = canvas.toDataURL("image/x-icon");
                document.getElementsByTagName('head')[0].appendChild(link);
            };
        }

        window.testAlert = () => {
            window.triggerTaskAlert("Testar o sinal MD");
            console.log("Canal de alertas e voz feminina ativos!");
        };

        window.closeInternalAlert = () => { document.getElementById('browser-alert').style.display = 'none'; };

        // Expondo as funções necessárias no escopo global para o HTML
        window.checkPassword = () => {
            const input = document.getElementById('password-input');
            if (input.value === ACCESS_PASSWORD) {
                document.getElementById('lock-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('lock-screen').style.display = 'none';
                    const mainContent = document.getElementById('main-content');
                    mainContent.style.display = 'block';
                    // Trigger reflow
                    void mainContent.offsetWidth;
                    mainContent.style.opacity = '1';
                }, 700);
            } else {
                input.classList.add('shake');
                setTimeout(() => input.classList.remove('shake'), 400);
            }
        };

        window.setFilter = (filter) => {
            currentFilter = filter;
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => {
                btn.classList.remove('text-pink-500', 'active-filter');
                const span = btn.querySelector('span');
                if(span) span.remove();
            });
            
            const activeBtn = Array.from(buttons).find(b => {
                if(filter === 'all' && b.innerText.includes('Visão Geral')) return true;
                if(filter === 'pending' && b.innerText.includes('Pendentes')) return true;
                if(filter === 'completed' && b.innerText.includes('Finalizadas')) return true;
                return false;
            });

            if (activeBtn) {
                activeBtn.classList.add('text-pink-500', 'active-filter');
                activeBtn.innerHTML += `<span class="absolute -bottom-9 left-0 right-0 h-[3px] bg-pink-500 rounded-full"></span>`;
            }
            renderTasks();
        };

        window.addMainTask = async () => {
            if (!currentUser) return;
            const titleInput = document.getElementById('main-task-input');
            const descInput = document.getElementById('main-desc-input');
            const priorityInput = document.getElementById('priority-select');
            const reminderInput = document.getElementById('reminder-input');

            const title = titleInput.value.trim();
            if (!title) {
                titleInput.classList.add('shake');
                setTimeout(() => titleInput.classList.remove('shake'), 400);
                return;
            }

            try {
                const tasksRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'tasks');
                await addDoc(tasksRef, {
                    title: title,
                    desc: descInput.value.trim(),
                    priority: priorityInput.value,
                    reminder: reminderInput.value,
                    completed: false,
                    createdAt: Date.now()
                });

                titleInput.value = '';
                descInput.value = '';
                reminderInput.value = '';
            } catch (error) {
                console.error("Erro ao adicionar tarefa:", error);
            }
        };

        window.deleteTask = async (id) => {
            if (!currentUser) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'tasks', id));
            } catch (error) {
                console.error("Erro ao deletar tarefa:", error);
            }
        };

        window.toggleComplete = async (id) => {
            if (!currentUser) return;
            const task = tasks.find(t => t.id === id);
            if (!task) return;

            try {
                await updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'tasks', id), {
                    completed: !task.completed
                });
            } catch (error) {
                console.error("Erro ao atualizar tarefa:", error);
            }
        };

        // --- NOVAS FUNÇÕES: EDIÇÃO E SUB-TAREFAS ---
        window.startEdit = (id) => {
            editingId = id;
            renderTasks();
        };

        window.cancelEdit = () => {
            editingId = null;
            renderTasks();
        };

        window.saveEdit = async (id) => {
            if (!currentUser) return;
            const titleInput = document.getElementById(`edit-title-${id}`);
            const descInput = document.getElementById(`edit-desc-${id}`);
            const reminderInput = document.getElementById(`edit-reminder-${id}`);
            
            if (!titleInput.value.trim()) {
                titleInput.classList.add('shake');
                setTimeout(() => titleInput.classList.remove('shake'), 400);
                return;
            }

            try {
                await updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'tasks', id), {
                    title: titleInput.value.trim(),
                    desc: descInput.value.trim(),
                    reminder: reminderInput ? reminderInput.value : ""
                });
                editingId = null;
            } catch (error) {
                console.error("Erro ao salvar edição:", error);
            }
        };

        window.addSubtask = async (taskId) => {
            if (!currentUser) return;
            const input = document.getElementById(`subtask-input-${taskId}`);
            const title = input.value.trim();
            if (!title) return;

            const task = tasks.find(t => t.id === taskId);
            if (!task) return;

            const newSubtask = {
                id: Math.random().toString(36).substring(2, 11),
                title: title,
                completed: false
            };

            const updatedSubtasks = [...(task.subtasks || []), newSubtask];

            try {
                await updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'tasks', taskId), {
                    subtasks: updatedSubtasks
                });
                input.value = '';
            } catch (error) {
                console.error("Erro ao adicionar sub-tarefa:", error);
            }
        };

        window.toggleSubtask = async (taskId, subtaskId) => {
            if (!currentUser) return;
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;

            const updatedSubtasks = (task.subtasks || []).map(st => 
                st.id === subtaskId ? { ...st, completed: !st.completed } : st
            );

            try {
                await updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'tasks', taskId), {
                    subtasks: updatedSubtasks
                });
            } catch (error) {
                console.error("Erro ao alternar sub-tarefa:", error);
            }
        };

        window.deleteSubtask = async (taskId, subtaskId) => {
            if (!currentUser) return;
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;

            const updatedSubtasks = (task.subtasks || []).filter(st => st.id !== subtaskId);

            try {
                await updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'tasks', taskId), {
                    subtasks: updatedSubtasks
                });
            } catch (error) {
                console.error("Erro ao deletar sub-tarefa:", error);
            }
        };
        // ------------------------------------------

        const renderTasks = () => {
            const list = document.getElementById('task-list');
            const emptyState = document.getElementById('empty-state');
            
            let filteredTasks = tasks;
            
            if (currentFilter === 'all') {
                // Aqui a correção: Na Visão Geral agora apenas exibe as tarefas NÃO concluídas.
                filteredTasks = tasks.filter(t => !t.completed);
            } else if (currentFilter === 'pending') {
                filteredTasks = tasks.filter(t => !t.completed);
            } else if (currentFilter === 'completed') {
                filteredTasks = tasks.filter(t => t.completed);
            }

            if (filteredTasks.length === 0) {
                list.innerHTML = '';
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                list.innerHTML = filteredTasks.map(task => {
                    const borderClass = task.priority === 'high' ? 'priority-high-border' :
                                        task.priority === 'medium' ? 'priority-medium-border' : 'priority-low-border';
                    const tagClass = task.priority === 'high' ? 'tag-high' :
                                     task.priority === 'medium' ? 'tag-medium' : 'tag-low';
                    const completedClass = task.completed ? 'completed-task' : '';
                    const textClass = task.completed ? 'completed-text' : 'text-white';

                    // Cálculo de dias pendentes (Tempo tag)
                    let pendingTag = '';
                    if (!task.completed && task.createdAt) {
                        const daysPending = Math.floor((Date.now() - task.createdAt) / (1000 * 60 * 60 * 24));
                        let timeClass = 'text-gray-400 bg-white/5 border-white/10';
                        
                        if (daysPending >= 2 && daysPending <= 4) {
                            timeClass = 'text-orange-400 bg-orange-500/10 border-orange-500/20';
                        } else if (daysPending >= 5) {
                            timeClass = 'text-red-500 bg-red-500/10 border-red-500/20';
                        }

                        const dayText = daysPending === 0 ? 'Hoje' : daysPending === 1 ? '1 dia' : `${daysPending} dias`;
                        pendingTag = `<span class="text-[9px] font-bold px-2 py-1 rounded-md border ${timeClass} flex items-center gap-1 transition-colors"><i data-lucide="timer" class="w-3 h-3"></i> ${dayText}</span>`;
                    }

                    // MODO DE EDIÇÃO
                    if (editingId === task.id) {
                        return `
                            <div class="glass-card p-6 rounded-2xl animate-task ${borderClass} flex flex-col gap-4">
                                <input type="text" id="edit-title-${task.id}" value="${task.title.replace(/"/g, '&quot;')}" class="edit-mode-input text-xl font-bold">
                                <textarea id="edit-desc-${task.id}" class="edit-mode-input text-sm min-h-[80px]">${(task.desc || '').replace(/</g, '&lt;')}</textarea>
                                <div class="flex items-center gap-3">
                                    <label class="text-[10px] uppercase font-bold text-gray-500 tracking-widest">Lembrete:</label>
                                    <input type="datetime-local" id="edit-reminder-${task.id}" value="${task.reminder || ''}" class="edit-mode-input text-xs w-auto cursor-pointer">
                                </div>
                                <div class="flex justify-end gap-3 mt-2">
                                    <button onclick="cancelEdit()" class="px-4 py-2 text-xs font-bold uppercase tracking-widest text-gray-400 hover:text-white transition-all">Cancelar</button>
                                    <button onclick="saveEdit('${task.id}')" class="px-4 py-2 bg-pink-500 text-white text-xs font-bold uppercase tracking-widest rounded-lg hover:bg-pink-600 transition-all">Salvar</button>
                                </div>
                            </div>
                        `;
                    }

                    // MODO NORMAL (com sub-tarefas)
                    const subtasksHTML = (task.subtasks || []).map(st => `
                        <div class="flex items-center gap-3 group mt-2">
                            <button onclick="toggleSubtask('${task.id}', '${st.id}')" class="w-4 h-4 rounded border ${st.completed ? 'bg-pink-500 border-pink-500 text-white' : 'border-white/20 hover:border-pink-500'} flex items-center justify-center transition-all shrink-0">
                                ${st.completed ? '<i data-lucide="check" class="w-3 h-3"></i>' : ''}
                            </button>
                            <span class="text-xs ${st.completed ? 'text-gray-500 line-through' : 'text-gray-300'} flex-grow break-words">${st.title}</span>
                            <button onclick="deleteSubtask('${task.id}', '${st.id}')" class="opacity-0 group-hover:opacity-100 text-gray-500 hover:text-pink-500 transition-opacity shrink-0">
                                <i data-lucide="x" class="w-3 h-3"></i>
                            </button>
                        </div>
                    `).join('');

                    return `
                        <div class="glass-card p-6 rounded-2xl animate-task ${borderClass} ${completedClass} flex flex-col md:flex-row gap-6 items-start md:items-center">
                            <div class="flex-grow w-full">
                                <div class="flex items-center gap-3 mb-3 flex-wrap">
                                    <span class="text-[9px] font-black uppercase tracking-widest px-2 py-1 rounded-md ${tagClass}">${task.priority}</span>
                                    ${task.reminder ? `<span class="text-[9px] font-bold text-gray-400 bg-white/5 px-2 py-1 rounded-md border border-white/5"><i data-lucide="clock" class="w-3 h-3 inline pb-0.5"></i> ${new Date(task.reminder).toLocaleString('pt-BR', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'})}</span>` : ''}
                                    ${pendingTag}
                                </div>
                                <h3 class="text-xl font-bold ${textClass} mb-2 break-words">${task.title}</h3>
                                ${task.desc ? `<p class="text-sm text-gray-400 line-clamp-2 break-words mt-1">${task.desc}</p>` : ''}
                                
                                <!-- Seção de Sub-tarefas -->
                                <div class="mt-4 pt-4 border-t border-white/5 w-full">
                                    <div class="space-y-1 mb-3">
                                        ${subtasksHTML}
                                    </div>
                                    <div class="flex gap-2">
                                        <input type="text" id="subtask-input-${task.id}" placeholder="Adicionar sub-tarefa..." class="edit-mode-input text-xs flex-grow" onkeypress="if(event.key === 'Enter') addSubtask('${task.id}')">
                                        <button onclick="addSubtask('${task.id}')" class="p-2 bg-white/5 hover:bg-pink-500 hover:text-white rounded-lg transition-all text-gray-400 shrink-0">
                                            <i data-lucide="plus" class="w-4 h-4"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <div class="flex items-center gap-3 shrink-0 self-end md:self-auto mt-4 md:mt-0 flex-wrap justify-end">
                                <button onclick="startEdit('${task.id}')" class="p-3 rounded-xl bg-white/5 hover:bg-blue-500/20 hover:text-blue-500 border border-white/5 transition-all text-gray-400" title="Editar Tarefa">
                                    <i data-lucide="pencil" class="w-5 h-5"></i>
                                </button>
                                <button onclick="toggleComplete('${task.id}')" class="p-3 rounded-xl bg-white/5 hover:bg-emerald-500/20 hover:text-emerald-500 border border-white/5 transition-all ${task.completed ? 'text-emerald-500 bg-emerald-500/10' : 'text-gray-400'}">
                                    <i data-lucide="check" class="w-5 h-5"></i>
                                </button>
                                <button onclick="deleteTask('${task.id}')" class="p-3 rounded-xl bg-white/5 hover:bg-pink-500/20 hover:text-pink-500 border border-white/5 transition-all text-gray-500">
                                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
            }
            
            // Recriar ícones lucide nos novos elementos
            lucide.createIcons();
            updateProgress();
        };

        const updateProgress = () => {
            const total = tasks.length;
            const completed = tasks.filter(t => t.completed).length;
            const percentage = total === 0 ? 0 : Math.round((completed / total) * 100);
            
            document.getElementById('overall-progress').style.width = `${percentage}%`;
            document.getElementById('percent-display').innerText = `${percentage}%`;

            const hasPending = tasks.some(t => !t.completed);
            updateFavicon(hasPending);
            
            if(hasPending) {
                document.getElementById('notif-dot').classList.remove('hidden');
            } else {
                document.getElementById('notif-dot').classList.add('hidden');
            }
        };

        const updateSyncTime = () => {
            const now = new Date();
            document.getElementById('sync-time').innerText = now.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});
        };

        // INICIALIZAÇÃO E FIREBASE
        const init = async () => {
            // Garante que as vozes sejam carregadas (alguns browsers demoram)
            window.speechSynthesis.onvoiceschanged = () => {};
            lucide.createIcons();
            
            try {
                if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                    const firebaseConfig = JSON.parse(__firebase_config);
                    const app = initializeApp(firebaseConfig);
                    auth = getAuth(app);
                    db = getFirestore(app);
                    isCloudMode = true;
                    
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else { 
                        await signInAnonymously(auth); 
                    }
                    
                    onAuthStateChanged(auth, (user) => {
                        currentUser = user;
                        if (user) {
                            document.getElementById('user-id-text').innerText = user.uid.substring(0, 8) + '...';
                            document.getElementById('status-dot').classList.replace('bg-gray-500', 'bg-emerald-500');

                            const tasksRef = collection(db, 'artifacts', appId, 'users', user.uid, 'tasks');
                            onSnapshot(tasksRef, (snapshot) => {
                                tasks = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                                tasks.sort((a, b) => b.createdAt - a.createdAt); // Ordena pelas mais recentes
                                renderTasks();
                                updateSyncTime();
                            }, (error) => {
                                console.error("Erro na leitura do Firebase:", error);
                            });
                        }
                    });
                }
            } catch (error) {
                console.error("Erro ao inicializar:", error);
                document.getElementById('sync-status').innerText = "Modo Offline";
                document.getElementById('status-dot').classList.replace('bg-gray-500', 'bg-red-500');
            }
        };

        // Chama o init() assim que a página carrega
        window.addEventListener('load', init);

    </script>
</body>
</html>
