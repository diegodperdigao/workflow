<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workflow 3C | Projeto MD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;300;400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #030008;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* FUNDO E EFEITOS */
        .bg-fluid {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
            background: radial-gradient(circle at 80% 20%, rgba(255, 0, 127, 0.06) 0%, transparent 50%),
                        radial-gradient(circle at 20% 80%, rgba(106, 13, 173, 0.08) 0%, transparent 50%);
        }

        .bg-noise {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.04; 
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* MOSAICO INFINITO */
        .mosaic-wrapper {
            position: absolute; inset: 0; overflow: hidden; z-index: 0; pointer-events: none; 
            -webkit-mask-image: linear-gradient(to bottom, transparent 0px, black 15%, black 85%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0px, black 15%, black 85%, transparent 100%);
            opacity: 0.22;
        }
        .mosaic-container {
            position: absolute; inset: 0; width: 110%; height: 110%;
            transform: perspective(1000px) rotateX(15deg) rotateY(-5deg) rotateZ(2deg);
        }
        .mosaic-pattern {
            width: 100%; height: 100%;
            background-image: url('https://i.ibb.co/TDvNpKbv/285535120-111261434935979-5560566145880188190-n.jpg');
            background-size: 100px; background-repeat: repeat;
            animation: panMosaic 60s linear infinite;
        }
        @keyframes panMosaic { from { background-position: 0px 0px; } to { background-position: -200px -200px; } }

        .glass-header { background: rgba(5, 5, 10, 0.95); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-card { background: rgba(15, 15, 20, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .command-input:focus { border-color: rgba(236, 72, 153, 0.4); background: rgba(0, 0, 0, 0.85); color: #fff; }
        .command-input::placeholder { color: #a1a1aa !important; opacity: 1; }

        .priority-high-border { border-left: 3px solid #f43f5e; }
        .priority-medium-border { border-left: 3px solid #a855f7; }
        .priority-low-border { border-left: 3px solid #06b6d4; }
        .tag-high { background: rgba(244, 63, 94, 0.1); color: #f43f5e; border: 1px solid rgba(244, 63, 94, 0.2); }
        .tag-medium { background: rgba(168, 85, 247, 0.1); color: #a855f7; border: 1px solid rgba(168, 85, 247, 0.2); }
        .tag-low { background: rgba(6, 182, 212, 0.1); color: #06b6d4; border: 1px solid rgba(6, 182, 212, 0.2); }

        .completed-task { opacity: 0.25; filter: grayscale(1); }
        .completed-text { text-decoration: line-through; color: #71717a; }

        .animate-task { animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .reminder-wrapper { position: relative; display: flex; align-items: center; }
        input[type="datetime-local"] { padding-right: 45px !important; width: 100%; }
        input[type="datetime-local"]::-webkit-calendar-picker-indicator {
            background: transparent; bottom: 0; color: transparent; cursor: pointer;
            height: auto; left: 0; position: absolute; right: 0; top: 0; width: auto; z-index: 10;
        }
        .reminder-wrapper::after {
            content: '📅'; position: absolute; right: 15px; top: 50%;
            transform: translateY(-50%); pointer-events: none; opacity: 0.4; font-size: 14px;
        }

        /* NOTIFICAÇÃO ESTILO MEET */
        #browser-alert {
            display: none;
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; width: 90%; max-width: 550px;
            background: rgba(20, 20, 25, 0.9); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #ec4899;
            padding: 24px; border-radius: 24px; 
            box-shadow: 0 40px 80px rgba(0,0,0,0.9);
            animation: meetPop 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }
        @keyframes meetPop { from { opacity: 0; transform: translate(-50%, -40px); } to { opacity: 1; transform: translate(-50%, 0); } }

        .edit-mode-input { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); padding: 8px 12px; border-radius: 8px; width: 100%; outline: none; color: #fff; }
        .form-label { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.15em; color: #6b7280; font-style: italic; margin-left: 0.5rem; }
        
        button svg { pointer-events: none; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .shake { animation: shake 0.2s ease-in-out 0s 2; border-color: #ef4444 !important; }
    </style>
</head>
<body class="antialiased selection:bg-pink-500 selection:text-white">
    <div class="bg-fluid"></div>
    <div class="bg-noise"></div>

    <!-- TELA DE BLOQUEIO -->
    <div id="lock-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-[#030008] transition-opacity duration-700">
        <div class="max-w-md w-full px-10 text-center">
            <div class="mb-8 flex flex-col items-center">
                <img src="https://i.ibb.co/TDvNpKbv/285535120-111261434935979-5560566145880188190-n.jpg" alt="3C" class="h-16 w-16 rounded-full object-cover border-2 border-white/10 mb-6">
                <h2 class="text-[10px] font-black tracking-[0.4em] uppercase text-gray-400 italic">inicie a sessão</h2>
            </div>
            <div class="glass-card p-10 rounded-3xl border border-white/10 shadow-2xl">
                <div class="space-y-6">
                    <input type="password" id="password-input" placeholder="••••••••" 
                        onkeypress="if(event.key === 'Enter') checkPassword()"
                        class="w-full bg-black/40 border border-white/10 px-6 py-5 rounded-2xl text-center text-white focus:outline-none focus:border-pink-500 transition-all tracking-widest font-mono">
                    <button onclick="checkPassword()" class="w-full bg-white text-black font-black uppercase text-[10px] tracking-[0.3em] py-5 rounded-2xl hover:bg-pink-500 hover:text-white transition-all duration-300 active:scale-95">
                        Acessar Workflow
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- NOTIFICAÇÃO INTERNA -->
    <div id="browser-alert">
        <div class="flex items-center gap-6 text-white">
            <div class="p-4 bg-pink-500/20 rounded-full border border-pink-500/30">
                <i data-lucide="bell" class="w-8 h-8 text-pink-500 animate-bounce"></i>
            </div>
            <div class="flex-grow">
                <p class="text-[9px] font-black uppercase tracking-[0.3em] text-pink-500 mb-1 italic">Vai trabalhar vagabundo!</p>
                <h3 id="alert-title" class="text-xl font-black uppercase leading-tight tracking-tight">Título da Tarefa</h3>
            </div>
            <button onclick="closeInternalAlert()" class="p-3 hover:bg-white/5 rounded-2xl transition-all">
                <i data-lucide="x" class="w-6 h-6 text-gray-500"></i>
            </button>
        </div>
    </div>

    <!-- CONTEÚDO PRINCIPAL -->
    <div id="main-content" class="hidden opacity-0 transition-opacity duration-1000">
        <nav class="fixed w-full z-50 top-0 glass-header">
            <div class="absolute top-0 left-0 right-0 h-[2px] bg-gradient-to-r from-transparent via-pink-500 to-transparent opacity-30"></div>
            <div class="max-w-[1400px] mx-auto px-8 py-3 flex justify-between items-center text-white">
                <div class="flex items-center gap-5">
                    <img src="https://i.ibb.co/TDvNpKbv/285535120-111261434935979-5560566145880188190-n.jpg" alt="3C" class="h-8 w-8 rounded-full border border-white/10 p-0.5 shadow-2xl">
                    <div class="flex flex-col">
                        <span class="text-[0.65rem] tracking-[0.4em] uppercase font-black leading-tight">PROJETO MD</span>
                        <span class="text-[0.45rem] tracking-[0.2em] uppercase text-gray-500 font-bold italic opacity-80 uppercase">3C_Execution_Control</span>
                    </div>
                </div>
                
                <div class="flex items-center gap-6">
                    <!-- SINO DISCRETO -->
                    <div id="notif-btn" onclick="testAlert()" class="p-2 bg-white/5 rounded-full border border-white/10 cursor-pointer hover:bg-white/10 transition-all group">
                        <i id="notif-bell-icon" data-lucide="bell" class="w-4 h-4 text-emerald-500 group-hover:scale-110 transition-transform"></i>
                    </div>
                    <div class="flex items-center gap-3 px-3 py-1.5 bg-white/5 rounded-xl border border-white/5">
                        <div id="status-dot" class="w-1.5 h-1.5 rounded-full bg-gray-500"></div>
                        <span id="user-id-text" class="text-[7px] font-black tracking-widest uppercase italic text-gray-400">Secure Link...</span>
                    </div>
                </div>
            </div>
        </nav>

        <div class="max-w-[1400px] mx-auto px-8 pt-20 pb-12 relative text-white">
            <div class="mt-4 mb-6 ml-4">
                <p class="font-mono text-[9px] text-gray-400 tracking-[0.4em] uppercase flex items-center gap-4">
                    <span class="w-10 h-[1.5px] bg-gradient-to-r from-pink-500 via-purple-500 to-cyan-500"></span> 
                    Strategy_Creative_Production_Bizdev
                </p>
            </div>

            <header class="mb-12 relative overflow-hidden rounded-2xl bg-white/[0.01] border border-white/[0.03] shadow-2xl flex items-center min-h-[280px]">
                <div class="mosaic-wrapper"><div class="mosaic-container"><div class="mosaic-pattern"></div></div></div>
                <div class="relative z-10 w-full px-12 py-10 flex flex-col md:flex-row justify-between items-center gap-12 text-white">
                    <div class="max-w-2xl text-center md:text-left flex-shrink-0 text-white">
                        <h1 class="text-7xl lg:text-8xl font-black tracking-tighter uppercase leading-none text-white whitespace-nowrap">
                            Workflow <span class="text-pink-500">3C</span>
                        </h1>
                    </div>
                    <div class="bg-black/85 p-8 rounded-2xl border border-white/10 min-w-[340px] backdrop-blur-xl shadow-2xl">
                        <div class="flex items-center justify-between mb-4 text-white">
                            <p id="stats-text" class="text-[9px] font-black text-gray-400 uppercase tracking-[0.3em]">Efficiency_Report</p>
                            <span id="percent-display" class="text-[10px] font-black text-pink-500">0%</span>
                        </div>
                        <div class="h-1.5 w-full bg-black/50 rounded-full overflow-hidden border border-white/5">
                            <div id="overall-progress" class="h-full bg-gradient-to-r from-pink-500 via-purple-600 to-emerald-500 transition-all duration-1000 shadow-[0_0_15px_rgba(236,72,153,0.3)]" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </header>

            <!-- COMMAND CENTER -->
            <div class="glass-card p-1 rounded-3xl mb-16 shadow-[0_30px_60px_rgba(0,0,0,0.7)] overflow-hidden">
                <div class="bg-[#050508]/95 p-10 rounded-3xl">
                    <div class="space-y-8">
                        <div class="flex flex-col lg:flex-row items-stretch gap-5 text-white">
                            <div class="flex-grow flex flex-col gap-3">
                                <label class="form-label">Ação Principal</label>
                                <input type="text" id="main-task-input" placeholder="O que vamos criar hoje?" 
                                    class="w-full bg-black/40 border border-white/10 rounded-xl px-6 py-6 text-white focus:outline-none command-input transition-all font-bold tracking-tight text-xl h-[72px]">
                            </div>
                            <div class="min-w-[200px] flex flex-col gap-3">
                                <label class="form-label">Prioridade</label>
                                <div class="relative h-[72px]">
                                    <select id="priority-select" class="w-full h-full appearance-none bg-black/40 border border-white/10 rounded-xl px-6 text-xs font-black uppercase text-gray-400 focus:outline-none cursor-pointer hover:border-white/20 transition-all text-white">
                                        <option value="high">HIGH</option>
                                        <option value="medium" selected>MEDIUM</option>
                                        <option value="low">LOW</option>
                                    </select>
                                    <i data-lucide="chevron-down" class="absolute right-5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-600 pointer-events-none"></i>
                                </div>
                            </div>
                        </div>
                        <div class="flex flex-col lg:flex-row items-stretch gap-6">
                            <div class="flex-grow flex flex-col gap-3">
                                <label class="form-label">Contexto Estratégico</label>
                                <textarea id="main-desc-input" placeholder="Detalhes estratégicos, links e metas..." 
                                    class="w-full bg-black/40 border border-white/10 rounded-xl px-6 py-5 text-base text-white focus:outline-none command-input transition-all min-h-[140px] resize-none"></textarea>
                            </div>
                            <div class="min-w-[300px] flex flex-col gap-3">
                                <label class="form-label">Agendar Notificação</label>
                                <div class="reminder-wrapper flex-grow">
                                    <input type="datetime-local" id="reminder-input" 
                                        class="bg-black/40 border border-white/10 rounded-xl px-6 py-5 text-sm font-bold text-white focus:outline-none focus:border-pink-500 transition-all w-full h-full cursor-pointer">
                                </div>
                            </div>
                        </div>
                        <div class="pt-4">
                            <button onclick="addMainTask()" class="w-full btn-launch bg-white text-black font-black uppercase text-[11px] tracking-[0.4em] rounded-xl hover:bg-pink-500 hover:text-white active:scale-[0.99] transition-all h-[72px] shadow-2xl">
                                Criar Tarefa
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- FILTROS -->
            <div class="flex flex-wrap justify-between items-center gap-8 mb-12 border-b border-white/5 pb-8 text-white">
                <div class="flex gap-12 text-[11px] font-black uppercase tracking-[0.3em] text-gray-600">
                    <button onclick="setFilter('all')" class="hover:text-pink-500 transition-all filter-btn active-filter text-pink-500 relative">
                        Visão Geral <span class="absolute -bottom-9 left-0 right-0 h-[3px] bg-pink-500 rounded-full"></span>
                    </button>
                    <button onclick="setFilter('pending')" class="hover:text-pink-500 transition-all filter-btn relative text-white">Pendentes</button>
                    <button onclick="setFilter('completed')" class="hover:text-pink-500 transition-all filter-btn relative text-white">Finalizadas</button>
                </div>
                <div class="flex items-center gap-4 text-[10px] font-bold text-gray-600 uppercase tracking-widest italic opacity-60">
                    <span id="sync-status">Cloud Sync Ready</span>
                    <div class="w-1.5 h-1.5 rounded-full bg-gray-800"></div>
                    <span id="sync-time">---</span>
                </div>
            </div>

            <div id="task-list" class="space-y-6 min-h-[300px]"></div>
            <div id="empty-state" class="hidden text-center py-32 opacity-10">
                <div class="inline-block p-10 rounded-full border-2 border-dashed border-white/20 mb-8"><i data-lucide="check-circle-2" class="w-20 h-20 mx-auto"></i></div>
                <p class="text-3xl font-black uppercase tracking-[0.5em]">Sem pendências</p>
            </div>
        </div>

        <footer class="py-16 bg-black border-t border-white/5 text-center mt-20 relative z-10 text-white">
            <img src="https://i.ibb.co/chfw0cND/Horizontal-Com-Tag-W.png" alt="3C" class="h-10 mx-auto opacity-70 mb-6 grayscale hover:grayscale-0 transition-all duration-700">
            <p class="text-[10px] text-gray-600 uppercase tracking-[0.3em] font-bold mb-2">Confidencial &copy; 2026 3C Gaming BizDev</p>
            <p class="text-[8px] text-gray-700 uppercase tracking-[0.1em] italic opacity-40">Workflow Management System v2.6.0</p>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js'
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js'
        import { getFirestore, collection, doc, onSnapshot, setDoc, deleteDoc, updateDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js'

        let db, auth, currentUser;
        let tasks = [];
        let editingId = null;
        let currentFilter = 'all';
        let isCloudMode = false;
        const ACCESS_PASSWORD = "3c2026"; 

        // --- SISTEMA DE ÁUDIO MEME ---
        function playMemeSound() {
            try {
                const utterance = new SpeechSynthesisUtterance("Vai trabalhar vagabundo!");
                utterance.lang = "pt-BR";
                utterance.rate = 1.1;
                utterance.pitch = 0.9;
                window.speechSynthesis.speak(utterance);
            } catch(e) {}
        }

        // --- SISTEMA DE FAVICON (SLACK STYLE) ---
        function updateFavicon(hasPending) {
            const canvas = document.createElement('canvas');
            canvas.width = 32; canvas.height = 32;
            const ctx = canvas.getContext('2d');
            
            // Desenha círculo base rosa
            ctx.fillStyle = '#ec4899';
            ctx.beginPath(); ctx.arc(16, 16, 14, 0, Math.PI * 2); ctx.fill();
            
            if (hasPending) {
                // Desenha ponto vermelho (Notificação)
                ctx.fillStyle = '#ff0000';
                ctx.beginPath(); ctx.arc(26, 6, 7, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = '#030008'; ctx.lineWidth = 2; ctx.stroke();
            }
            
            const link = document.querySelector("link[rel*='icon']") || document.createElement('link');
            link.type = 'image/x-icon'; link.rel = 'shortcut icon';
            link.href = canvas.toDataURL("image/x-icon");
            document.getElementsByTagName('head')[0].appendChild(link);
        }

        window.testAlert = () => {
            document.getElementById('alert-title').innerText = "Teste de Sinal";
            document.getElementById('browser-alert').style.display = 'block';
            playMemeSound();
            triggerToast("Canal de alertas ativo!");
        };

        window.closeInternalAlert = () => { document.getElementById('browser-alert').style.display = 'none'; };

        const init = async () => {
            try {
                if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                    const firebaseConfig = JSON.parse(__firebase_config);
                    const app = initializeApp(firebaseConfig);
                    auth = getAuth(app);
                    db = getFirestore(app);
                    isCloudMode = true;
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else { await signInAnonymously(auth); }
                    onAuthStateChanged(auth, (user) => {
                        currentUser = user;
                        if (user) {
                            document.getElementById('user-id-text').innerText = `ID: ${user.uid.substring(0, 12)}`;
                            document.getElementById('status-dot').className = "w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse";
                            setupSync();
                        }
                    });
                } else { useLocalMode(); }
            } catch (err) { useLocalMode(); }
        };

        function useLocalMode() {
            isCloudMode = false;
            const saved = localStorage.getItem('3c_tasks_v26');
            if (saved) tasks = JSON.parse(saved);
            renderTasks();
        }

        function setupSync() {
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'workflow-md-master-v2';
            const tasksCol = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'tasks');
            onSnapshot(tasksCol, (snap) => {
                tasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                tasks.sort((a, b) => b.createdAt - a.createdAt);
                renderTasks();
                document.getElementById('sync-time').innerText = new Date().toLocaleTimeString('pt-BR');
            });
        }

        window.checkPassword = () => {
            if(document.getElementById('password-input').value === ACCESS_PASSWORD) {
                const lock = document.getElementById('lock-screen'), main = document.getElementById('main-content');
                lock.style.opacity = '0';
                setTimeout(() => { lock.style.display = 'none'; main.classList.remove('hidden'); setTimeout(() => main.style.opacity = '1', 50); }, 700);
            } else {
                const input = document.getElementById('password-input');
                input.classList.add('shake'); input.value = ''; setTimeout(() => input.classList.remove('shake'), 400);
            }
        };

        // --- CONTROLES GLOBAIS ---
        window.addMainTask = async () => {
            const titleInput = document.getElementById('main-task-input'), descInput = document.getElementById('main-desc-input'), reminderInput = document.getElementById('reminder-input');
            const title = titleInput.value.trim();
            if (!title) return;
            const newTask = {
                text: title, description: descInput.value, priority: document.getElementById('priority-select').value,
                completed: false, expanded: false, createdAt: Date.now(),
                reminderAt: reminderInput.value ? new Date(reminderInput.value).getTime() : null,
                reminderSent: false, subtasks: []
            };
            if (isCloudMode && currentUser) {
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'workflow-md-master-v2';
                await setDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'tasks', Date.now().toString()), newTask);
            } else {
                newTask.id = Date.now().toString(); tasks.unshift(newTask); saveLocal();
            }
            titleInput.value = ''; descInput.value = ''; reminderInput.value = '';
            triggerToast("Tarefa Protocolada");
        };

        window.saveEdit = async (id) => {
            const tId = id.toString();
            const newTitle = document.getElementById(`edit-title-${tId}`).value.trim(), newDesc = document.getElementById(`edit-desc-${tId}`).value.trim();
            const remField = document.getElementById(`edit-reminder-${tId}`);
            const newRemAt = remField && remField.value ? new Date(remField.value).getTime() : null;
            if (!newTitle) return;
            if (isCloudMode && currentUser) {
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'workflow-md-master-v2';
                await updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'tasks', tId), { text: newTitle, description: newDesc, reminderAt: newRemAt, reminderSent: false });
            } else {
                const t = tasks.find(x => x.id === tId); t.text = newTitle; t.description = newDesc; t.reminderAt = newRemAt; t.reminderSent = false;
                saveLocal();
            }
            editingId = null; renderTasks(); triggerToast("Guardado");
        };

        window.deleteTask = async (id, isSub = false, pId = null) => {
            const tId = id.toString(), pIdStr = pId ? pId.toString() : null;
            if (isCloudMode && currentUser) {
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'workflow-md-master-v2';
                const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'tasks', (pIdStr || tId));
                if (isSub) {
                    const p = tasks.find(x => x.id === pIdStr);
                    await updateDoc(docRef, { subtasks: p.subtasks.filter(s => s.id !== tId) });
                } else { await deleteDoc(docRef); triggerToast("Removido"); }
            } else {
                if (isSub) { const p = tasks.find(x => x.id === pIdStr); p.subtasks = p.subtasks.filter(s => s.id !== tId); }
                else { tasks = tasks.filter(x => x.id !== tId); triggerToast("Removido"); }
                saveLocal();
            }
        };

        window.toggleTask = async (id, isSub = false, pId = null) => {
            const tId = id.toString(), pIdStr = pId ? pId.toString() : null;
            if (isCloudMode && currentUser) {
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'workflow-md-master-v2';
                const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'tasks', (pIdStr || tId));
                if (isSub) {
                    const p = tasks.find(x => x.id === pIdStr);
                    await updateDoc(docRef, { subtasks: p.subtasks.map(s => s.id === tId ? { ...s, completed: !s.completed } : s) });
                } else {
                    const t = tasks.find(x => x.id === tId); const st = !t.completed;
                    await updateDoc(docRef, { completed: st, subtasks: (t.subtasks || []).map(s => ({ ...s, completed: st })) });
                }
            } else {
                if (isSub) { const p = tasks.find(x => x.id === pIdStr); const s = p.subtasks.find(x => x.id === tId); s.completed = !s.completed; }
                else { const t = tasks.find(x => x.id === tId); t.completed = !t.completed; (t.subtasks || []).forEach(s => s.completed = t.completed); }
                saveLocal();
            }
        };

        window.toggleExpand = async (id) => {
            const t = tasks.find(x => x.id === id.toString());
            if (isCloudMode && currentUser) {
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'workflow-md-master-v2';
                await updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'tasks', id.toString()), { expanded: !t.expanded });
            } else { t.expanded = !t.expanded; saveLocal(); }
        };

        window.addSubTask = async (pId) => {
            const input = document.getElementById(`sub-input-${pId}`), val = input.value.trim();
            if (!val) return;
            const t = tasks.find(x => x.id === pId.toString());
            const subs = [...(t.subtasks || []), { id: Date.now().toString(), text: val, completed: false }];
            if (isCloudMode && currentUser) {
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'workflow-md-master-v2';
                await updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'tasks', pId.toString()), { subtasks: subs });
            } else { t.subtasks = subs; saveLocal(); }
            input.value = '';
        };

        window.startEdit = (id) => { editingId = id.toString(); renderTasks(); };
        window.setFilter = (f) => {
            currentFilter = f;
            document.querySelectorAll('.filter-btn').forEach(b => { b.classList.remove('text-pink-500'); b.querySelector('span')?.remove(); });
            event.target.classList.add('text-pink-500');
            event.target.insertAdjacentHTML('beforeend', `<span class="absolute -bottom-9 left-0 right-0 h-[3px] bg-pink-500 rounded-full"></span>`);
            renderTasks();
        };

        function saveLocal() { localStorage.setItem('3c_tasks_v26', JSON.stringify(tasks)); renderTasks(); }

        function renderTasks() {
            const container = document.getElementById('task-list'), empty = document.getElementById('empty-state');
            const f = tasks.filter(t => currentFilter === 'pending' ? !t.completed : currentFilter === 'completed' ? t.completed : true);
            if (!f.length) { container.innerHTML = ''; empty.classList.remove('hidden'); }
            else { empty.classList.add('hidden'); container.innerHTML = f.map(t => generateHTML(t)).join(''); }
            const total = tasks.length, concl = tasks.filter(x => x.completed).length;
            const p = total ? Math.round((concl / total) * 100) : 0;
            document.getElementById('stats-text').innerText = `${concl} DE ${total} TAREFAS FINALIZADAS`;
            document.getElementById('overall-progress').style.width = `${p}%`;
            document.getElementById('percent-display').innerText = `${p}%`;
            
            // ATUALIZA FAVICON
            updateFavicon(tasks.some(t => !t.completed));
            lucide.createIcons();
        }

        function generateHTML(t) {
            const isEditing = editingId === t.id.toString(), isC = t.completed;
            const p = (t.subtasks || []).length ? Math.round((t.subtasks.filter(s => s.completed).length / t.subtasks.length) * 100) : (isC ? 100 : 0);
            const diff = Math.floor(Math.abs(Date.now() - t.createdAt) / 86400000);
            const statusClass = diff < 3 ? 'text-cyan-400' : 'status-critical';
            const reminderDate = t.reminderAt ? new Date(t.reminderAt).toLocaleString('pt-BR', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'}) : null;
            const isoReminder = t.reminderAt ? new Date(t.reminderAt).toISOString().slice(0, 16) : '';

            return `
                <div class="glass-card rounded-2xl overflow-hidden animate-task ${isC ? 'completed-task' : `priority-${t.priority}-border`}">
                    <div class="p-4 text-white">
                        <div class="flex items-start gap-4 text-white text-white">
                            <button onclick="toggleTask('${t.id}')" class="mt-1 hover:scale-110 transition-all text-white"><i data-lucide="${isC ? 'check-circle-2' : 'circle'}" class="w-6 h-6 ${isC ? 'text-emerald-500' : 'text-white/10'} text-white"></i></button>
                            <div class="flex-grow text-white">
                                <div class="flex flex-wrap items-center gap-2 mb-1">
                                    ${isEditing ? `<input type="text" id="edit-title-${t.id}" value="${t.text}" class="edit-mode-input font-bold text-lg">` : `<h3 class="font-black text-lg uppercase tracking-tighter ${isC ? 'completed-text' : 'text-white'} text-white">${t.text}</h3>`}
                                    <span class="px-2 py-0.5 text-[7px] font-black uppercase tracking-widest rounded-full tag-${t.priority}">${t.priority}</span>
                                    ${reminderDate ? `<span class="flex items-center gap-1 px-2 py-0.5 bg-pink-500/10 text-pink-500 text-[7px] font-black uppercase rounded-full border border-pink-500/20 text-white"><i data-lucide="bell" class="w-2.5 h-2.5 text-white"></i> ${reminderDate}</span>` : ''}
                                </div>
                                <div class="mb-3">
                                    ${isEditing ? `
                                        <div class="space-y-3 mt-3">
                                            <textarea id="edit-desc-${t.id}" class="edit-mode-input text-xs h-16 resize-none text-white">${t.description || ''}</textarea>
                                            <div class="reminder-wrapper w-48"><input type="datetime-local" id="edit-reminder-${t.id}" value="${isoReminder}" class="edit-mode-input text-[10px]"></div>
                                        </div>` : (t.description ? `<p class="text-[11px] text-gray-400 leading-relaxed line-clamp-1 text-white">${t.description}</p>` : '')}
                                </div>
                                <div class="flex items-center gap-4 text-[8px] font-bold text-gray-500 uppercase tracking-widest">
                                    <span class="flex items-center gap-1 text-white text-white"><i data-lucide="calendar" class="w-2.5 h-2.5"></i> ${new Date(t.createdAt).toLocaleDateString('pt-BR')}</span>
                                    <span class="flex items-center gap-1 ${statusClass}"><i data-lucide="clock-3" class="w-2.5 h-2.5 text-white"></i> ${diff === 0 ? 'HOJE' : `${diff} DIAS`}</span>
                                    ${(t.subtasks || []).length > 0 ? `<div class="flex items-center gap-2"><div class="h-0.5 w-12 bg-black/40 rounded-full overflow-hidden text-white"><div class="h-full bg-pink-500" style="width:${p}%"></div></div><span>${p}%</span></div>` : ''}
                                </div>
                            </div>
                            <div class="flex items-center gap-1">
                                ${isEditing ? `<button onclick="saveEdit('${t.id}')" class="p-2 hover:bg-emerald-500/20 rounded-lg text-emerald-500"><i data-lucide="check" class="w-4 h-4 text-white text-white text-white"></i></button>` : `<button onclick="startEdit('${t.id}')" class="p-2 hover:bg-white/5 rounded-lg text-gray-500"><i data-lucide="pencil" class="w-4 h-4 text-white text-white text-white"></i></button>`}
                                <button onclick="toggleExpand('${t.id}')" class="p-2 hover:bg-white/5 rounded-lg text-gray-500"><i data-lucide="${t.expanded ? 'minus' : 'plus'}" class="w-4 h-4 text-white text-white text-white"></i></button>
                                <button onclick="deleteTask('${t.id}')" class="p-2 hover:bg-red-500/20 rounded-lg text-gray-500 group"><i data-lucide="trash-2" class="w-4 h-4 group-hover:text-red-500 text-white text-white text-white"></i></button>
                            </div>
                        </div>
                    </div>
                    ${t.expanded ? `
                        <div class="bg-black/30 p-4 pt-2 space-y-4">
                            <div class="space-y-3 ml-8 relative text-white text-white">
                                ${(t.subtasks || []).map(s => `
                                    <div class="flex items-center gap-3 group relative text-white">
                                        <div class="branch-line text-white"></div><div class="branch-node text-white text-white"></div>
                                        <button onclick="toggleTask('${s.id}', true, '${t.id}')" class="hover:scale-110 transition-all text-white text-white text-white"><i data-lucide="${s.completed ? 'check-square' : 'square'}" class="w-4 h-4 ${s.completed ? 'text-purple-500' : 'text-white/10'}"></i></button>
                                        <span class="text-[10px] ${s.completed ? 'completed-text italic' : 'text-gray-300 font-bold'} flex-grow text-white">${s.text}</span>
                                        <button onclick="deleteTask('${s.id}', true, '${t.id}')" class="opacity-0 group-hover:opacity-100 transition-opacity text-white text-white text-white text-white"><i data-lucide="x" class="w-3 h-3 text-gray-600 hover:text-red-500"></i></button>
                                    </div>`).join('')}
                            </div>
                            <div class="ml-8 mt-4 flex gap-3 text-white text-white text-white text-white"><input type="text" id="sub-input-${t.id}" placeholder="Sub-tarefa..." class="bg-transparent border-b border-white/10 text-[10px] py-1 flex-grow focus:outline-none focus:border-pink-500 text-white text-white text-white text-white" onkeypress="if(event.key==='Enter')addSubTask('${t.id}')"><button onclick="addSubTask('${t.id}')" class="p-1.5 hover:bg-white/5 rounded-lg text-white text-white text-white text-white text-white"><i data-lucide="plus" class="w-4 h-4 text-white text-white text-white text-white"></i></button></div>
                        </div>` : ''}
                </div>`;
        }

        // --- MONITOR DE ALERTAS (3 SEG) ---
        setInterval(() => {
            const now = Date.now();
            tasks.forEach(task => {
                if (!task.completed && task.reminderAt && !task.reminderSent) {
                    if (now >= task.reminderAt) {
                        document.getElementById('alert-title').innerText = task.text;
                        document.getElementById('browser-alert').style.display = 'block';
                        playMemeSound();
                        markReminderAsSent(task.id);
                    }
                }
            });
        }, 3000);

        async function markReminderAsSent(taskId) {
            const tIdString = taskId.toString();
            if (isCloudMode && currentUser) {
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'workflow-md-master-v2';
                await updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'tasks', tIdString), { reminderSent: true });
            } else { const t = tasks.find(x => x.id === tIdString); if (t) t.reminderSent = true; saveLocal(); }
        }

        function triggerToast(m) { const t = document.getElementById('toast'); document.getElementById('toast-msg').innerText = m; t.classList.remove('translate-y-32', 'opacity-0'); setTimeout(() => t.classList.add('translate-y-32', 'opacity-0'), 3500); }

        init();
    </script>
</body>
</html>
